<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Web Editor</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 800px; 
      margin: 40px auto; 
      padding: 20px; 
      border: 1px solid #ccc; 
      border-radius: 10px; 
      background: #f9f9f9;
    }
    textarea { 
      width: 100%; 
      height: 300px; 
      font-size: 16px; 
      padding: 10px; 
      border-radius: 5px;
      border: 1px solid #aaa;
      box-sizing: border-box;
      resize: vertical;
    }
    .info { 
      margin-top: 10px; 
      font-size: 14px; 
    }
    #timer { font-weight: bold; color: green; }
    button {
      margin-top: 10px;
      padding: 10px 15px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #saveBtn { background-color: #2196F3; color: white; margin-right: 10px; }
    #submitBtn { background-color: #4CAF50; color: white; }
  </style>
</head>
<body>
  <h1>My Web Editor</h1>

  <textarea id="editor" placeholder="여기에 글을 입력하세요..."></textarea>

  <div class="info">
    글자 수: <span id="charCount">0</span> | 
    타이머: <span id="timer">00:00</span>
  </div>

  <button id="saveBtn">임시저장</button>
  <button id="submitBtn">제출</button>

  <script>
    const editor = document.getElementById('editor');
    const charCount = document.getElementById('charCount');
    const timer = document.getElementById('timer');
    const saveBtn = document.getElementById('saveBtn');
    const submitBtn = document.getElementById('submitBtn');

    // 글자수 실시간
    editor.addEventListener('input', () => {
      charCount.textContent = editor.value.length;
    });

    // 타이머
    let seconds = 0;
    setInterval(() => {
      seconds++;
      const min = String(Math.floor(seconds/60)).padStart(2,'0');
      const sec = String(seconds%60).padStart(2,'0');
      timer.textContent = `${min}:${sec}`;
    }, 1000);

    // 임시저장 (localStorage)
    saveBtn.addEventListener('click', () => {
      localStorage.setItem('myEditorContent', editor.value);
      alert('임시저장 완료!');
    });

    // 제출 버튼 (간단 alert 예제)
    submitBtn.addEventListener('click', () => {
      alert('제출되었습니다!\n내용:\n' + editor.value);
      // 실제 서버 제출 구현하려면 fetch/ajax 사용
    });

    // 로드 시 임시저장 내용 불러오기
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('myEditorContent');
      if(saved) editor.value = saved;
      charCount.textContent = editor.value.length;
    });
  </script>
</body>
</html>
